name: Build Kernel A71 Android 16 Docker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_samsung_a71
          kernel-branch: lineage-23.2
          config: a71_defconfig
          arch: arm64
          
          # HỖ TRỢ DOCKER (LXC)
          lxc: true
          lxc-patch: true
          
          # TẮT TẢI TỰ ĐỘNG (ĐỂ TRÁNH LỖI 400)
          aosp-clang: false
          aosp-gcc: false
          
          # DÙNG MIRROR CỦA MICROSOFT CHO CLANG R547379
          # Script sẽ clone toàn bộ repo này (khá nặng, nhưng rất chuẩn)
          other-clang-url: https://github.com/msft-mirror-aosp/platform.prebuilts.clang.host.linux-x86.git
          other-clang-branch: master
          
          # DÙNG GCC MỒI TỪ LINEAGEOS (ỔN ĐỊNH CHO ARM64)
          other-gcc64-url: https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9
          other-gcc64-branch: lineage-19.1
          other-gcc32-url: https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9
          other-gcc32-branch: lineage-19.1
          
          android-version: 16
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
          
          # THAM SỐ ÉP SỬ DỤNG CLANG R547379 TRONG THƯ MỤC VỪA TẢI
          # Lưu ý: Cần trỏ CC đến đúng đường dẫn mà script giải nén (thường là /home/runner/clang/clang-r547379/bin/clang)
          extra-make-args: '["LLVM=1", "LLVM_IAS=1", "CC=clang", "CLANG_TRIPLE=aarch64-linux-gnu-", "CROSS_COMPILE=aarch64-linux-android-", "CROSS_COMPILE_ARM32=arm-linux-androideabi-", "KCFLAGS=-w"]'
