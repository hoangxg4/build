name: Build Kernel A71 Android 16 Docker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_samsung_a71
          kernel-branch: lineage-23.2
          config: a71_defconfig
          arch: arm64
          
          # HỖ TRỢ DOCKER/LXC (Action sẽ tự động bật CONFIG_...)
          lxc: true
          lxc-patch: true
          
          # TẮT TẢI TỪ GOOGLE (ĐỂ TRÁNH LỖI 400)
          aosp-clang: false
          aosp-gcc: false
          
          # SỬ DỤNG ZYC CLANG (Bản này cực kỳ ổn định, có sẵn GCC bên trong)
          other-clang-url: https://github.com/ZyCromerZ/Clang.git
          other-clang-branch: 19 # Bản Clang 19 mới nhất cho Android 16
          
          # VÌ ZYC CLANG ĐÃ CÓ SẴN GCC NÊN KHÔNG CẦN KHAI BÁO THÊM GCC LẺ
          # NHƯNG SCRIPT YÊU CẦU INPUT NÊN TA ĐỂ TRỐNG HOẶC TRỎ VÀO CHÍNH NÓ
          other-gcc64-url: https://github.com/ZyCromerZ/Clang.git
          other-gcc64-branch: 19
          
          android-version: 16
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
          
          # ÉP BIÊN DỊCH BẰNG LLVM ĐỂ TỐI ƯU CHO ANDROID 16
          extra-make-args: '["LLVM=1", "LLVM_IAS=1", "LD=ld.lld", "AR=llvm-ar", "NM=llvm-nm", "OBJCOPY=llvm-objcopy", "OBJDUMP=llvm-objdump", "STRIP=llvm-strip"]'
