name: Build Kernel A71 Android 16 Docker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_samsung_a71
          kernel-branch: lineage-23.2
          config: a71_defconfig
          arch: arm64
          
          # HỖ TRỢ DOCKER (LXC)
          lxc: true
          lxc-patch: true
          
          # SỬ DỤNG CLANG CHÍNH CHỦ GOOGLE
          aosp-clang: true
          # Phiên bản theo tài liệu bạn gửi cho Android 16
          aosp-clang-version: r547379 
          
          # SỬ DỤNG GCC MỒI (Bắt buộc phải có để script không lỗi)
          aosp-gcc: true
          # Vì Android 16 không có GCC, ta mồi bằng bản Android 12 ổn định nhất
          android-version: 12 
          
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
          
          # BIẾN MÔI TRƯỜNG ĐỂ ÉP DÙNG LLVM TRONG ANDROID 16
          extra-make-args: '["LLVM=1", "LLVM_IAS=1", "CC=clang", "LD=ld.lld", "AR=llvm-ar", "NM=llvm-nm", "STRIP=llvm-strip", "OBJCOPY=llvm-objcopy", "OBJDUMP=llvm-objdump"]'
