name: Build Kernel A71 Android 16 Docker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git tar

      - name: Download Clang r547379 from Google
        run: |
          mkdir -p ${{ github.workspace }}/my-clang
          # Tải bản r547379 chính chủ Android 16 (Dạng archive để né lỗi 400)
          curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz -o clang.tar.gz
          tar -C ${{ github.workspace }}/my-clang -zxf clang.tar.gz
          
          # Biến thư mục này thành một Git Repo cục bộ để 'kernel_build_action' chấp nhận
          cd ${{ github.workspace }}/my-clang
          git init
          git config user.email "bot@action.com"
          git config user.name "Builder"
          git add .
          git commit -m "Initial Clang r547379"
          git branch -m master

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_samsung_a71
          kernel-branch: lineage-23.2
          config: a71_defconfig
          arch: arm64
          
          # QUAN TRỌNG: Tắt lxc tự động để tránh lỗi 'cstate' trong mã nguồn Samsung
          lxc: true
          lxc-patch: false
          
          # Trỏ vào Repo Clang chúng ta vừa tự tạo ở trên
          aosp-clang: false
          other-clang-url: ${{ github.workspace }}/my-clang
          other-clang-branch: master
          
          # GCC mồi (Dùng Android 12 để né lỗi 128)
          aosp-gcc: true
          android-version: 12
          
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Ép dùng Clang và bỏ qua các lỗi cú pháp Samsung
          extra-make-args: '["LLVM=1", "LLVM_IAS=1", "KCFLAGS=-w", "CC=clang", "LD=ld.lld"]'
