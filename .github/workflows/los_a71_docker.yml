name: Build Kernel A71 Android 16 Docker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_samsung_a71
          kernel-branch: lineage-23.2
          config: a71_defconfig
          arch: arm64
          
          # 1. KÍCH HOẠT DOCKER/LXC
          lxc: true
          lxc-patch: false
          
          # 2. SETUP CLANG: Dùng link GitLab r547379 bạn vừa tìm
          aosp-clang: false
          other-clang-url: https://gitlab.com/kei-space/clang/r547379.git
          other-clang-branch: master
          
          # 3. SETUP GCC: Ép về bản 12 để tránh lỗi "branch android16-release not found"
          aosp-gcc: true
          android-version: 12
          
          # 4. ĐÓNG GÓI
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
          
          # 5. THAM SỐ BIÊN DỊCH: Tắt cảnh báo để tránh dừng build giữa chừng
          extra-make-args: '["LLVM=1", "LLVM_IAS=1", "KCFLAGS=-w", "CC=clang", "LD=ld.lld"]'
