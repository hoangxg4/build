name: Build Kernel A71 Android 16 Docker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_samsung_a71
          ref: lineage-23.2
          path: kernel

      - name: Download and Setup Clang 23
        run: |
          mkdir -p toolchain/clang
          # Tải bản Clang 23 bạn vừa đưa
          wget https://github.com/ZyCromerZ/Clang/releases/download/23.0.0git-20260130-release/Clang-23.0.0git-20260130.tar.gz
          # Giải nén vào thư mục toolchain
          tar -C toolchain/clang -zxf Clang-23.0.0git-20260130.tar.gz
          # Thêm vào PATH để Action có thể gọi
          echo "$(pwd)/toolchain/clang/bin" >> $GITHUB_PATH

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_samsung_a71
          kernel-branch: lineage-23.2
          config: a71_defconfig
          arch: arm64
          
          # DOCKER SUPPORT
          lxc: true
          lxc-patch: true
          
          # TẮT TẢI TỰ ĐỘNG VÌ TA ĐÃ SETUP THỦ CÔNG Ở TRÊN
          aosp-clang: false
          aosp-gcc: false
          
          # CHỈ ĐỊNH ĐƯỜNG DẪN CLANG ĐÃ GIẢI NÉN
          other-clang-url: $(pwd)/toolchain/clang
          
          android-version: 16
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
          
          # ÉP BIÊN DỊCH BẰNG LLVM CỰC MẠNH (Dùng Clang 23 làm chủ đạo)
          extra-make-args: '["LLVM=1", "LLVM_IAS=1", "CC=clang", "LD=ld.lld", "AR=llvm-ar", "NM=llvm-nm", "STRIP=llvm-strip", "OBJCOPY=llvm-objcopy", "OBJDUMP=llvm-objdump"]'
