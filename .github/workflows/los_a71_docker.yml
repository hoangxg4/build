name: Build Kernel A71 Docker Android 16

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_samsung_a71
          kernel-branch: lineage-23.2
          config: a71_defconfig
          arch: arm64
          
          # DOCKER & LXC SUPPORT
          lxc: true
          lxc-patch: true
          
          # TOOLCHAIN CONFIG (FIX LỖI GCC)
          aosp-gcc: true
          # Quan trọng: Ép lấy GCC bản 12 vì bản 16 không tồn tại trên server Google
          gcc-branch: android12-release 
          
          aosp-clang: true
          android-version: 12 # Đổi cái này thành 12 để script tải được cả Clang + GCC 12 ổn định
          aosp-clang-version: r530567 # Nhưng vẫn ép dùng bản Clang mới nhất cho Android 16
          
          # PACKAGING
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
