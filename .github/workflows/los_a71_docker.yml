name: Build Kernel A71 Docker Android 16

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_samsung_a71
          kernel-branch: lineage-23.2
          config: a71_defconfig
          arch: arm64
          # PHẦN QUAN TRỌNG CHO DOCKER
          lxc: true
          lxc-patch: true
          
          # PHẦN FIX LỖI TOOLCHAIN CHO ANDROID 16
          aosp-gcc: false # Tắt GCC để tránh lỗi 128 (vì Android 16 dùng Clang thuần)
          aosp-clang: true
          android-version: 16
          aosp-clang-version: r530567 # Bản Clang mới nhất cho Android 16
          
          # ĐÓNG GÓI & PHÁT HÀNH
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
