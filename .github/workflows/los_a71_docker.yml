name: Build Kernel A71 Android 16 Docker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_samsung_a71
          ref: lineage-23.2
          path: kernel

      - name: Setup Docker-Ready Config
        run: |
          cd kernel
          CONF="arch/arm64/configs/a71_defconfig"
          # Bật các tính năng lõi cho Docker trên Android 16
          scripts/config --file $CONF -e NAMESPACES
          scripts/config --file $CONF -e NET_NS
          scripts/config --file $CONF -e PID_NS
          scripts/config --file $CONF -e IPC_NS
          scripts/config --file $CONF -e CGROUPS
          scripts/config --file $CONF -e CGROUP_DEVICE
          scripts/config --file $CONF -e OVERLAY_FS
          scripts/config --file $CONF -e VETH
          scripts/config --file $CONF -e BRIDGE
          scripts/config --file $CONF -e USER_NS
          # Android 16 yêu cầu nén kernel bằng LZ4 hoặc ZSTD để boot nhanh
          scripts/config --file $CONF -e KERNEL_LZ4

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_samsung_a71
          kernel-branch: lineage-23.2
          config: a71_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          android-version: 16 # Khai báo Android 16
          aosp-clang-version: r530567 # Bản Clang cho Android 16
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
