name: Build Kernel A71 Android 16 Docker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_samsung_a71
          kernel-branch: lineage-23.2
          config: a71_defconfig
          arch: arm64
          
          # THAY ĐỔI QUAN TRỌNG Ở ĐÂY:
          # Tạm thời tắt lxc tự động của Action để tránh làm hỏng cấu trúc RunQueue (rq)
          lxc: false 
          lxc-patch: false
          
          # Quay lại sử dụng Clang r530567 - Bản này "dễ tính" hơn với code cũ
          aosp-clang: true
          aosp-clang-version: r530567
          
          # Giữ GCC 12 để mồi
          aosp-gcc: true
          android-version: 12
          
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Thêm cờ để bỏ qua các lỗi định nghĩa biến và ép biên dịch
          extra-make-args: '["LLVM=1", "LLVM_IAS=1", "KCFLAGS=-w -Wno-error=implicit-function-declaration", "CC=clang"]'
