name: Build Kernel A71 ReSukiSU

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Clang r547379
        run: |
          mkdir -p ${{ github.workspace }}/my-clang
          curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz -o clang.tar.gz
          tar -C ${{ github.workspace }}/my-clang -zxf clang.tar.gz
          cd ${{ github.workspace }}/my-clang
          git init && git config user.email "bot@action.com" && git config user.name "Builder"
          git add . && git commit -m "init" && git branch -m master

      - name: Checkout Kernel Source (LineageOS)
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_samsung_a71
          ref: lineage-23.2
          path: kernel_source
          fetch-depth: 0
          submodules: true

      - name: Setup ReSukiSU as Git Submodule
        run: |
          cd kernel_source
          # Thiết lập danh tính Git
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Clone ReSukiSU vào thư mục kernel/ReSukiSU
          git clone https://github.com/ReSukiSU/ReSukiSU.git kernel/ReSukiSU
          
          # Tạo symlink drivers/kernelsu -> ReSukiSU/kernel
          mkdir -p drivers/kernelsu
          cp -r kernel/ReSukiSU/kernel/* drivers/kernelsu/
          
          # Bật CONFIG_KSU, CONFIG_KSU_MANUAL_HOOK và tắt KPROBES
          echo "CONFIG_KSU=y" >> arch/arm64/configs/a71_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/a71_defconfig
          sed -i 's/CONFIG_KPROBES=y/CONFIG_KPROBES=n/g' arch/arm64/configs/a71_defconfig
          
          # Commit và ép tên nhánh là master
          git add .
          git commit -m "Add ReSukiSU"
          git branch -m master

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: file://${{ github.workspace }}/kernel_source
          kernel-branch: master
          config: a71_defconfig
          arch: arm64
          ksu: false
          lxc: false
          aosp-clang: false
          other-clang-url: ${{ github.workspace }}/my-clang
          other-clang-branch: master
          aosp-gcc: true
          android-version: 12
          anykernel3: false # TẮT TÍNH NĂNG TỰ ĐỘNG LỖI
          release: false
          access-token: ${{ secrets.GITHUB_TOKEN }}
          extra-make-args: '["LLVM=1", "LLVM_IAS=1", "KCFLAGS=-w", "CC=clang", "LD=ld.lld"]'

      - name: Package AnyKernel3 Manually
        run: |
          echo "=== 1. Clone AnyKernel3 chuẩn ==="
          git clone https://github.com/osm0sis/AnyKernel3.git AK3
          cd AK3
          rm -rf .git # Xóa thư mục git ẩn để giảm dung lượng file zip
          
          echo "=== 2. Lấy Kernel Image ==="
          # Tìm file Image.gz-dtb (hoặc Image.gz, Image) trong thư mục build out
          KERNEL_IMAGE=$(find ${{ github.workspace }}/kernel_source -type f \( -name "Image.gz-dtb" -o -name "Image.gz" -o -name "Image" \) | grep "arch/arm64/boot" | head -n 1)
          
          if [ -z "$KERNEL_IMAGE" ]; then
            echo "❌ Fatal: Không tìm thấy Kernel Image sau khi compile!"
            exit 1
          fi
          
          echo "✅ Đã tìm thấy và copy: $KERNEL_IMAGE"
          cp "$KERNEL_IMAGE" ./
          
          echo "=== 3. Cấu hình nhanh anykernel.sh ==="
          # Thay đổi device names cơ bản thành a71
          sed -i 's/device.name1=maguro/device.name1=a71/g' anykernel.sh
          sed -i 's/device.name2=toro/device.name2=a715f/g' anykernel.sh
          sed -i 's/device.name3=toroplus/device.name3=a715/g' anykernel.sh
          
          echo "=== 4. Đóng gói Zip chuẩn ==="
          # Nén tất cả các file trong thư mục AK3 hiện tại
          zip -r9 ${{ github.workspace }}/AnyKernel3_A71_ReSukiSU.zip *
          
          echo "=== 5. Kiểm tra cấu trúc file zip ==="
          unzip -l ${{ github.workspace }}/AnyKernel3_A71_ReSukiSU.zip

      - name: Upload Release los_a71_ksu
        uses: softprops/action-gh-release@v1
        with:
          tag_name: los_a71_ksu
          name: Kernel A71 ReSukiSU (los_a71_ksu)
          body: |
            Build Kernel Samsung A71 với ReSukiSU
            - Kernel Source: LineageOS/android_kernel_samsung_a71 (lineage-23.2)
            - Root Solution: ReSukiSU
            - Trang web: https://resukisu.github.io/
          files: ${{ github.workspace }}/AnyKernel3_A71_ReSukiSU.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
