name: Build Kernel A71 ReSukiSU

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
      - name: Setup Clang r547379
        run: |
          mkdir -p ${{ github.workspace }}/my-clang
          curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz -o clang.tar.gz
          tar -C ${{ github.workspace }}/my-clang -zxf clang.tar.gz
          cd ${{ github.workspace }}/my-clang
          git init && git config user.email "bot@action.com" && git config user.name "Builder"
          git add . && git commit -m "init" && git branch -m master

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_samsung_a71
          ref: lineage-23.2
          path: kernel_source
          fetch-depth: 0
          submodules: true

      - name: Setup ReSukiSU (Strict Block-Scoped Hooks - FIX BOOTLOOP)
        run: |
          cd kernel_source
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # 1. Thêm Submodule ReSukiSU
          git submodule add https://github.com/ReSukiSU/ReSukiSU.git KernelSU
          
          # 2. BOT PYTHON: TẠO HOOK (ĐÃ FIX LỖI CON TRỎ STAT GÂY BOOTLOOP)
          cat << 'EOF' > patch_ksu.py
          import os

          hooks = [
              {
                  'file': 'fs/stat.c',
                  'search': 'error = vfs_fstatat(dfd, filename, &stat, flag);',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\t{\n\t\textern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);\n\t\tksu_handle_stat(&dfd, &filename, &flag);\n\t}\n#endif\n\t'
              },
              {
                  'file': 'fs/stat.c',
                  'search': 'return cp_new_stat(&stat, statbuf);',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\t{\n\t\textern int ksu_handle_newfstat_ret(int *dfd, void *statbuf);\n\t\tksu_handle_newfstat_ret(&dfd, statbuf);\n\t}\n#endif\n\t'
              },
              {
                  'file': 'fs/stat.c',
                  'search': 'return cp_new_stat64(&stat, statbuf);',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\t{\n\t\textern int ksu_handle_fstat64_ret(int *dfd, void *statbuf);\n\t\tksu_handle_fstat64_ret(&dfd, statbuf);\n\t}\n#endif\n\t'
              },
              {
                  'file': 'fs/exec.c',
                  'search': 'retval = unshare_files(&displaced);',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\t{\n\t\textern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);\n\t\tksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);\n\t}\n#endif\n\t'
              },
              {
                  'file': 'fs/open.c',
                  'search': 'if (mode & ~S_IRWXO)',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\t{\n\t\textern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);\n\t\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);\n\t}\n#endif\n\t'
              },
              {
                  'file': 'kernel/reboot.c',
                  'search': 'if (!ns_capable(pid_ns->user_ns, CAP_SYS_BOOT))',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\t{\n\t\textern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);\n\t\tksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\n\t}\n#endif\n\t'
              },
              {
                  'file': 'drivers/input/input.c',
                  'search': 'if (is_event_supported(type, dev->evbit, EV_MAX)) {',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\t{\n\t\textern bool ksu_input_hook;\n\t\textern int ksu_handle_input_handle_event(unsigned int *type, unsigned int *code, int *value);\n\t\tif (unlikely(ksu_input_hook))\n\t\t\tksu_handle_input_handle_event(&type, &code, &value);\n\t}\n#endif\n\t'
              },
              {
                  'file': 'kernel/sys.c',
                  'search': 'ksuid = make_kuid(ns, suid);',
                  'after': '\n#ifdef CONFIG_KSU_MANUAL_HOOK\n\t{\n\t\textern int ksu_handle_setresuid(uid_t ruid, uid_t euid, uid_t suid);\n\t\tksu_handle_setresuid(ruid, euid, suid);\n\t}\n#endif'
              },
              {
                  'file': 'fs/read_write.c',
                  'search': 'ret = vfs_read(f.file, buf, count, &pos);',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\t{\n\t\textern bool ksu_init_rc_hook;\n\t\textern int ksu_handle_sys_read(unsigned int fd, char __user **buf_ptr, size_t *count_ptr);\n\t\tif (unlikely(ksu_init_rc_hook))\n\t\t\tksu_handle_sys_read(fd, &buf, &count);\n\t}\n#endif\n\t'
              }
          ]

          for hook in hooks:
              if not os.path.exists(hook['file']):
                  continue
              
              with open(hook['file'], 'r') as f:
                  content = f.read()

              search_str = hook.get('search', '')
              if search_str and search_str in content:
                  if 'before' in hook and hook['before'] not in content:
                      content = content.replace(search_str, hook['before'] + search_str)
                  if 'after' in hook and hook['after'] not in content:
                      content = content.replace(search_str, search_str + hook['after'])
                  print(f"THÀNH CÔNG: Đã chèn hook chuẩn vào {hook['file']}")

              with open(hook['file'], 'w') as f:
                  f.write(content)
          EOF
          python3 patch_ksu.py
          
          # 3. Tạo symlink và nạp Makefile/Kconfig
          cd drivers
          ln -sf ../KernelSU/kernel kernelsu
          cd ..
          echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          
          # 4. Kích hoạt MANUAL_HOOK trong defconfig
          echo "CONFIG_KSU=y" >> arch/arm64/configs/a71_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/a71_defconfig
          
          # Tắt KPROBES
          sed -i '/CONFIG_KPROBES/d' arch/arm64/configs/a71_defconfig
          sed -i '/CONFIG_HAVE_KPROBES/d' arch/arm64/configs/a71_defconfig
          sed -i '/CONFIG_KPROBE_EVENTS/d' arch/arm64/configs/a71_defconfig
          
          git add .
          git commit -m "Fix bootloop by using correct statbuf pointer"
          git branch -m master

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: file://${{ github.workspace }}/kernel_source
          kernel-branch: master
          config: a71_defconfig
          arch: arm64
          ksu: false
          lxc: false
          aosp-clang: false
          other-clang-url: ${{ github.workspace }}/my-clang
          other-clang-branch: master
          aosp-gcc: true
          android-version: 12
          anykernel3: true
          anykernel3-url: https://github.com/osm0sis/AnyKernel3
          release: false
          access-token: ${{ secrets.GITHUB_TOKEN }}
          extra-make-args: '["LLVM=1", "LLVM_IAS=1", "KCFLAGS=-w", "CC=clang", "LD=ld.lld"]'

      - name: Package AnyKernel3 Manually
        run: |
          echo "=== 1. Cloning AnyKernel3 ==="
          git clone https://github.com/osm0sis/AnyKernel3.git AK3_Manual
          cd AK3_Manual
          rm -rf .git
          
          echo "=== 2. Fetching Kernel Image ==="
          KERNEL_IMAGE=$(find ${{ github.workspace }} -type f \( -name "Image.gz-dtb" -o -name "Image.gz" -o -name "Image" \) | grep -v "AK3_Manual" | head -n 1)
          cp "$KERNEL_IMAGE" ./
          
          echo "=== 3. Generating anykernel.sh ==="
          cat << 'EOF' > anykernel.sh
          # AnyKernel3 Ramdisk Mod Script
          properties() { '
          kernel.string=ReSukiSU Kernel for Samsung A71
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=a71
          device.name2=a715f
          device.name3=a715
          device.name4=
          device.name5=
          supported.versions=
          supported.patchlevels=
          supported.vendorpatchlevels=
          '; }
          
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=0;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          
          . tools/ak3-core.sh;
          split_boot;
          
          android=$(file_getprop /system/build.prop ro.build.version.sdk);
          patch_cmdline "android.is_aosp" "";
          
          if [ -n "$android" ] && [ "$android" -lt 34 ]; then
             patch_cmdline "android.legacy_ebpf=" "android.legacy_ebpf=1";
          fi
          
          flash_boot;
          EOF
          
          echo "=== 4. Zipping package ==="
          zip -r9 ${{ github.workspace }}/AnyKernel3_A71_ReSukiSU.zip *

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: los_a71_ksu
          name: Kernel A71 ReSukiSU (los_a71_ksu)
          body: |
            ### ReSukiSU Kernel for Samsung Galaxy A71
            - **Fixes:** Sửa lỗi treo logo (bootloop) do sai con trỏ statbuf.
          files: ${{ github.workspace }}/AnyKernel3_A71_ReSukiSU.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up Action Artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: '*'
