name: Build Kernel A71 ReSukiSU

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
      - name: Setup Clang r547379
        run: |
          mkdir -p ${{ github.workspace }}/my-clang
          curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz -o clang.tar.gz
          tar -C ${{ github.workspace }}/my-clang -zxf clang.tar.gz
          cd ${{ github.workspace }}/my-clang
          git init && git config user.email "bot@action.com" && git config user.name "Builder"
          git add . && git commit -m "init" && git branch -m master

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_samsung_a71
          ref: lineage-23.2
          path: kernel_source
          fetch-depth: 0
          submodules: true

      - name: Setup ReSukiSU (Strict Manual Hooks)
        run: |
          cd kernel_source
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # 1. Thêm Submodule ReSukiSU
          git submodule add https://github.com/ReSukiSU/ReSukiSU.git KernelSU
          
          # 2. BOT PYTHON: PHÂN TÁCH KHAI BÁO & GỌI HÀM (C CHUẨN)
          cat << 'EOF' > patch_ksu.py
          import os

          hooks = [
              {
                  'file': 'fs/stat.c',
                  'includes': '#ifdef CONFIG_KSU_MANUAL_HOOK\nextern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);\nextern void ksu_handle_newfstat_ret(unsigned int *fd, struct stat __user **statbuf_ptr);\nextern void ksu_handle_fstat64_ret(int *fd, void *statbuf_ptr);\n#endif\n\n',
                  'search': 'error = vfs_fstatat(dfd, filename, &stat, flag);',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_stat(&dfd, &filename, &flag);\n#endif\n\t'
              },
              {
                  'file': 'fs/stat.c',
                  'search': 'error = cp_new_stat(&stat, statbuf);',
                  'after': '\n#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_newfstat_ret(&fd, (struct stat __user **)&statbuf);\n#endif'
              },
              {
                  'file': 'fs/stat.c',
                  'search': 'error = cp_new_stat64(&stat, statbuf);',
                  'after': '\n#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_fstat64_ret((int *)&fd, (void *)&statbuf);\n#endif'
              },
              {
                  'file': 'fs/exec.c',
                  'includes': '#ifdef CONFIG_KSU_MANUAL_HOOK\nextern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);\n#endif\n\n',
                  'search': 'struct user_arg_ptr envp = { .ptr.native = __envp };',
                  'after': '\n#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_execveat((int *)AT_FDCWD, &filename, &argv, &envp, 0);\n#endif'
              },
              {
                  'file': 'fs/open.c',
                  'includes': '#ifdef CONFIG_KSU_MANUAL_HOOK\nextern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);\n#endif\n\n',
                  'search': 'if (mode & ~S_IRWXO)',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);\n#endif\n\t'
              },
              {
                  'file': 'kernel/reboot.c',
                  'includes': '#ifdef CONFIG_KSU_MANUAL_HOOK\nextern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);\n#endif\n\n',
                  'search': 'if (!ns_capable(pid_ns->user_ns, CAP_SYS_BOOT))',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\n#endif\n\t'
              },
              {
                  'file': 'drivers/input/input.c',
                  'includes': '#ifdef CONFIG_KSU_MANUAL_HOOK\nextern bool ksu_input_hook __read_mostly;\nextern int ksu_handle_input_handle_event(unsigned int *type, unsigned int *code, int *value);\n#endif\n\n',
                  'search': 'if (is_event_supported(type, dev->evbit, EV_MAX)) {',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\tif (unlikely(ksu_input_hook))\n\t\tksu_handle_input_handle_event(&type, &code, &value);\n#endif\n\t'
              },
              {
                  'file': 'kernel/sys.c',
                  'includes': '#ifdef CONFIG_KSU_MANUAL_HOOK\nextern int ksu_handle_setresuid(uid_t ruid, uid_t euid, uid_t suid);\n#endif\n\n',
                  'search': 'kruid = make_kuid(ns, ruid);',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\t(void)ksu_handle_setresuid(ruid, euid, suid);\n#endif\n\t'
              },
              {
                  'file': 'fs/read_write.c',
                  'includes': '#ifdef CONFIG_KSU_MANUAL_HOOK\nextern bool ksu_init_rc_hook __read_mostly;\nextern int ksu_handle_sys_read(unsigned int fd, char __user **buf_ptr, size_t *count_ptr);\n#endif\n\n',
                  'search': 'if (f.file) {',
                  'before': '#ifdef CONFIG_KSU_MANUAL_HOOK\n\tif (unlikely(ksu_init_rc_hook))\n\t\tksu_handle_sys_read(fd, &buf, &count);\n#endif\n\t'
              }
          ]

          for hook in hooks:
              if not os.path.exists(hook['file']):
                  print(f"BỎ QUA: Không tìm thấy file {hook['file']}")
                  continue
              
              with open(hook['file'], 'r') as f:
                  content = f.read()

              # Đưa khai báo hàm lên đầu file để C Compiler không báo lỗi
              if 'includes' in hook and hook['includes'] not in content:
                  content = content.replace('#include <', hook['includes'] + '#include <', 1)

              # Chèn phần gọi hàm vào đúng vị trí cần thiết
              search_str = hook.get('search', '')
              if search_str and search_str in content:
                  if 'before' in hook and hook['before'] not in content:
                      content = content.replace(search_str, hook['before'] + search_str)
                  if 'after' in hook and hook['after'] not in content:
                      content = content.replace(search_str, search_str + hook['after'])
                  print(f"THÀNH CÔNG: Đã chèn hook chuẩn vào {hook['file']}")
              else:
                  print(f"CẢNH BÁO: Không tìm thấy chuỗi nhận diện trong {hook['file']}")

              with open(hook['file'], 'w') as f:
                  f.write(content)
          EOF
          python3 patch_ksu.py
          
          # 3. Tạo đường dẫn tắt chuẩn xác vào thư mục drivers
          cd drivers
          ln -sf ../KernelSU/kernel kernelsu
          cd ..
          
          # 4. Khai báo Makefile và Kconfig
          echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          
          # 5. Bật ReSukiSU và chế độ MANUAL HOOK trong defconfig
          echo "CONFIG_KSU=y" >> arch/arm64/configs/a71_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/a71_defconfig
          
          # Tắt KPROBES
          sed -i '/CONFIG_KPROBES/d' arch/arm64/configs/a71_defconfig
          sed -i '/CONFIG_HAVE_KPROBES/d' arch/arm64/configs/a71_defconfig
          sed -i '/CONFIG_KPROBE_EVENTS/d' arch/arm64/configs/a71_defconfig
          
          git add .
          git commit -m "Strict Auto-patched Manual Hooks with C Standard Declarations"
          git branch -m master

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: file://${{ github.workspace }}/kernel_source
          kernel-branch: master
          config: a71_defconfig
          arch: arm64
          ksu: false
          lxc: false
          aosp-clang: false
          other-clang-url: ${{ github.workspace }}/my-clang
          other-clang-branch: master
          aosp-gcc: true
          android-version: 12
          anykernel3: true
          anykernel3-url: https://github.com/osm0sis/AnyKernel3
          release: false
          access-token: ${{ secrets.GITHUB_TOKEN }}
          extra-make-args: '["LLVM=1", "LLVM_IAS=1", "KCFLAGS=-w", "CC=clang", "LD=ld.lld"]'

      - name: Package AnyKernel3 Manually
        run: |
          echo "=== 1. Cloning official AnyKernel3 ==="
          git clone https://github.com/osm0sis/AnyKernel3.git AK3_Manual
          cd AK3_Manual
          rm -rf .git
          
          echo "=== 2. Fetching Kernel Image ==="
          KERNEL_IMAGE=$(find ${{ github.workspace }} -type f \( -name "Image.gz-dtb" -o -name "Image.gz" -o -name "Image" \) | grep -v "AK3_Manual" | head -n 1)
          if [ -z "$KERNEL_IMAGE" ]; then
            echo "❌ Fatal Error: Kernel Image not found!"
            exit 1
          fi
          echo "✅ Found and copied: $KERNEL_IMAGE"
          cp "$KERNEL_IMAGE" ./
          
          echo "=== 3. Generating custom anykernel.sh for A71 ==="
          cat << 'EOF' > anykernel.sh
          # AnyKernel3 Ramdisk Mod Script
          properties() { '
          kernel.string=ReSukiSU Kernel for Samsung A71
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=a71
          device.name2=a715f
          device.name3=a715
          device.name4=
          device.name5=
          supported.versions=
          supported.patchlevels=
          supported.vendorpatchlevels=
          '; }
          
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=0;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          
          . tools/ak3-core.sh;
          
          split_boot;
          
          device=$(file_getprop /system/build.prop ro.product.system.device);
          android=$(file_getprop /system/build.prop ro.build.version.sdk);
          
          patch_cmdline "android.is_aosp" "";
          
          if [ -n "$android" ] && [ "$android" -lt 34 ]; then
             ui_print " ";
             ui_print "Android 13 (or lower) detected. Patching cmdline...";
             patch_cmdline "android.legacy_ebpf=" "android.legacy_ebpf=1";
          fi
          
          flash_boot;
          EOF
          
          echo "=== 4. Zipping the final package ==="
          zip -r9 ${{ github.workspace }}/AnyKernel3_A71_ReSukiSU.zip *

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: los_a71_ksu
          name: Kernel A71 ReSukiSU (los_a71_ksu)
          body: |
            ### ReSukiSU Kernel for Samsung Galaxy A71
            - **Fixes:** Perfect Strict C Standard Manual Hooks. Passes all ReSukiSU syntax and integration checks.
          files: ${{ github.workspace }}/AnyKernel3_A71_ReSukiSU.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up Action Artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: '*'
