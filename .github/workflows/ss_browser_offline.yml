name: Build Samsung Internet Offline Installer

on:
  workflow_dispatch: # Cho phép trigger thủ công từ giao diện GitHub Actions

jobs:
  build-and-pack:
    runs-on: windows-latest
    
    steps:
      - name: 1. Download Samsung Internet Installer
        run: |
          $url = "https://browser.samsung.com/media/x64_SamsungInternetSetup.exe"
          $installer = "SamsungSetup.exe"
          Write-Host "Downloading $url..."
          Invoke-WebRequest -Uri $url -OutFile $installer
        shell: powershell

      - name: 2 & 3. Install & Active Polling
        run: |
          Write-Host "Starting Web Installer..."
          $args = @("--system-level", "--silent", "--do-not-launch-chrome")
          Start-Process -FilePath ".\SamsungSetup.exe" -ArgumentList $args -NoNewWindow
          
          $targetDirSystem = "C:\Program Files\Samsung\Internet\Application"
          $targetDirUser = "$env:LOCALAPPDATA\Samsung\Internet\Application"
          $finalDir = ""
          
          $timeoutSeconds = 300
          $interval = 5
          $elapsed = 0
          $isInstalled = $false
          
          Write-Host "Waiting for payload download and extraction (Timeout: 5 mins)..."
          
          while ($elapsed -lt $timeoutSeconds) {
              if (Test-Path $targetDirSystem) { $finalDir = $targetDirSystem }
              elseif (Test-Path $targetDirUser) { $finalDir = $targetDirUser }
              
              if ($finalDir -ne "") {
                  $exes = Get-ChildItem -Path $finalDir -Filter "*.exe" -ErrorAction SilentlyContinue
                  if ($exes.Count -gt 0) {
                      Write-Host "Download complete! Found core executable at $finalDir"
                      $isInstalled = $true
                      Write-Host "Waiting 15s for file handles to release..."
                      Start-Sleep -Seconds 15
                      break
                  }
              }
              
              Start-Sleep -Seconds $interval
              $elapsed += $interval
              Write-Host "Waited $elapsed seconds..."
          }
          
          if (-not $isInstalled) {
              Write-Error "Timeout! Installation exceeded 5 minutes or network failed."
              exit 1
          }
          
          $zipName = "SamsungInternet_Offline.zip"
          Write-Host "Compressing offline folder..."
          Compress-Archive -Path "$finalDir\*" -DestinationPath $zipName -Force
          Write-Host "Compression successful: $zipName"
        shell: powershell

      - name: 4. Upload Offline Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-internet-offline-zip
          path: SamsungInternet_Offline.zip
          retention-days: 7
