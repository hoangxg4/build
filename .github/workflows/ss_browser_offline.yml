name: Build Samsung Internet Offline Installer

on:
  workflow_dispatch:

jobs:
  build-and-pack:
    runs-on: windows-latest
    
    steps:
      - name: 1. Download Samsung Internet Installer
        run: |
          $url = "https://browser.samsung.com/media/x64_SamsungInternetSetup.exe"
          Write-Host "Downloading $url..."
          Invoke-WebRequest -Uri $url -OutFile "SamsungSetup.exe"
        shell: powershell

      - name: 2 & 3. API Intercept & Download CRX (Bypass CUP2)
        run: |
          Write-Host "Bypass CUP2 Key: Gửi Request JSON thuần lên Server..."
          
          # Đã xóa bỏ hoàn toàn ?cup2key=... và ?cup2hreq=...
          $url = "https://update.internet.apps.samsung.com/service/update2/json"
          
          $headers = @{
              "Content-Type" = "application/json"
              "User-Agent" = "SamsungInternetUpdater 143.0.0.8"
          }
          
          $payload = @{
              request = @{
                  protocol = "3.0"
                  os = @{ platform = "win"; version = "10.0"; arch = "x64" }
                  app = @(
                      @{
                          appid = "ohpjbciplfdockeiligelcjnkiejldpn"
                          version = "0.0.0.0"
                          updatecheck = @{}
                      }
                  )
              }
          } | ConvertTo-Json -Depth 10 -Compress
          
          Write-Host "Đang gọi API Omaha..."
          $response = Invoke-WebRequest -Uri $url -Method Post -Headers $headers -Body $payload -UseBasicParsing
          $rawText = $response.Content
          
          # Cắt bỏ JSON Hijacking Protection ()]}')
          if ($rawText.StartsWith(")]}'")) {
              $rawText = $rawText.Substring(4).Trim()
          }
          
          $data = $rawText | ConvertFrom-Json
          
          # Xử lý linh hoạt 2 cấu trúc JSON thường gặp của Omaha
          $appData = if ($data.response.apps) { $data.response.apps[0] } else { $data.response.app[0] }
          $updateCheck = $appData.updatecheck
          
          if ($updateCheck.status -eq "ok") {
              $version = $updateCheck.manifest.version
              if (-not $version) { $version = "Latest" }
              
              # Lấy URL tải file
              $baseUrl = $updateCheck.urls.url[0].codebase
              $filename = $updateCheck.manifest.packages.package[0].name
              $dlUrl = "$baseUrl$filename"
              
              Write-Host "=================================================="
              Write-Host "✅ JACKPOT!!! Tìm thấy bản v$version"
              Write-Host "✅ Tải từ: $dlUrl"
              Write-Host "=================================================="
              
              Write-Host "Đang tải file Payload (.crx)..."
              $crxFile = "SamsungInternet.crx"
              Invoke-WebRequest -Uri $dlUrl -OutFile $crxFile
              
              Write-Host "Trích xuất file CRX..."
              # CRX thực chất là chuẩn nén ZIP, đổi tên và giải nén
              $zipFile = "SamsungInternet.zip"
              Rename-Item -Path $crxFile -NewName $zipFile
              
              $extractDir = "SamsungOffline"
              Expand-Archive -Path $zipFile -DestinationPath $extractDir -Force
              
              Write-Host "Đóng gói Artifact..."
              Compress-Archive -Path "$extractDir\*" -DestinationPath "SamsungInternet_Offline.zip" -Force
              Write-Host "Thành công tuyệt đối!"
          } else {
              Write-Error "❌ Server từ chối. Status: $($updateCheck.status)"
              exit 1
          }
        shell: powershell

      - name: 4. Upload Offline Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-internet-offline-zip
          path: SamsungInternet_Offline.zip
          retention-days: 7
