name: Build Samsung Internet Offline Installer

on:
  workflow_dispatch:

jobs:
  build-and-pack:
    runs-on: windows-latest
    
    steps:
      - name: 1. Download Samsung Internet Installer
        run: |
          $url = "https://browser.samsung.com/media/x64_SamsungInternetSetup.exe"
          Write-Host "Downloading $url..."
          Invoke-WebRequest -Uri $url -OutFile "SamsungSetup.exe"
        shell: powershell

      - name: 2 & 3. API Intercept via XML Endpoint (Bypass CUP2)
        run: |
          Write-Host "Chuyển hướng chiến thuật: Tấn công Endpoint XML Legacy..."
          
          # Đổi URL: Xóa đuôi /json đi
          $url = "https://update.internet.apps.samsung.com/service/update2"
          
          $headers = @{
              "Content-Type" = "application/xml"
              "User-Agent" = "SamsungInternetUpdater 143.0.0.8"
              "X-Goog-Update-AppId" = "ohpjbciplfdockeiligelcjnkiejldpn"
              "X-Goog-Update-Updater" = "updater-143.0.7499.194"
          }
          
          # Dùng nguyên bản XML Request
          $xmlRequest = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <request protocol="3.0" updater="samsung-internet" ismachine="1">
              <os platform="win" version="10.0" arch="x64"/>
              <app appid="ohpjbciplfdockeiligelcjnkiejldpn" version="0.0.0.0" installsource="ondemand">
                  <updatecheck/>
              </app>
          </request>
          "@
          
          Write-Host "Đang gửi gói tin XML..."
          $response = Invoke-WebRequest -Uri $url -Method Post -Headers $headers -Body $xmlRequest -UseBasicParsing
          
          # Ép kiểu phản hồi về định dạng XML của PowerShell để dễ bóc tách
          [xml]$xmlData = $response.Content
          
          # Trích xuất dữ liệu bằng XPath
          $updateCheckStatus = $xmlData.SelectSingleNode("//updatecheck").status
          
          if ($updateCheckStatus -eq "ok") {
              $version = $xmlData.SelectSingleNode("//manifest").version
              $baseUrl = $xmlData.SelectSingleNode("//url").codebase
              $filename = $xmlData.SelectSingleNode("//package").name
              $dlUrl = "$baseUrl$filename"
              
              Write-Host "=================================================="
              Write-Host "✅ JACKPOT!!! Phiên bản: $version"
              Write-Host "✅ Link tải gốc: $dlUrl"
              Write-Host "=================================================="
              
              Write-Host "Đang tải file Payload ($filename)..."
              Invoke-WebRequest -Uri $dlUrl -OutFile $filename
              
              Write-Host "Giải mã và trích xuất file CRX bằng 7-Zip..."
              $extractDir = "SamsungOffline"
              New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
              
              # Sử dụng 7-Zip có sẵn của GitHub Actions để ép giải nén CRX bỏ qua Header bảo mật
              & "C:\Program Files\7-Zip\7z.exe" x $filename -o$extractDir -y
              
              if ($LASTEXITCODE -eq 0) {
                  Write-Host "Đóng gói Artifact thành file ZIP hoàn chỉnh..."
                  Compress-Archive -Path "$extractDir\*" -DestinationPath "SamsungInternet_Offline.zip" -Force
                  Write-Host "✅ Thành công tuyệt đối!"
              } else {
                  Write-Error "❌ Lỗi khi giải nén file CRX."
                  exit 1
              }
          } else {
              Write-Error "❌ Server từ chối yêu cầu. XML Response:"
              Write-Host $response.Content
              exit 1
          }
        shell: powershell

      - name: 4. Upload Offline Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-internet-offline-zip
          path: SamsungInternet_Offline.zip
          retention-days: 7
