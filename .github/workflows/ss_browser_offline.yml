name: Build Samsung Internet Offline Installer

on:
  workflow_dispatch: # Cho phép trigger thủ công từ giao diện GitHub Actions

jobs:
  build-and-pack:
    runs-on: windows-latest
    
    steps:
      - name: 1. Download Samsung Internet Installer
        run: |
          $url = "https://browser.samsung.com/media/x64_SamsungInternetSetup.exe"
          $installer = "SamsungSetup.exe"
          Write-Host "Đang tải $url..."
          Invoke-WebRequest -Uri $url -OutFile $installer
        shell: powershell

      - name: 2. Silent Install (Chromium Engine)
        run: |
          Write-Host "Bắt đầu cài đặt (Chromium Engine)..."
          
          # Flags chuyên dụng cho Chromium mini_installer
          $args = @("--system-level", "--silent", "--do-not-launch-chrome")
          $process = Start-Process -FilePath ".\SamsungSetup.exe" -ArgumentList $args -Wait -PassThru -NoNewWindow
          
          Write-Host "Tiến trình cài đặt khởi tạo kết thúc với Exit Code: $($process.ExitCode)"
          
          # Đợi 30s để tiến trình con (setup.exe) hoàn tất việc bung file và ghi Registry
          Write-Host "Chờ 30 giây để I/O disk hoàn tất..."
          Start-Sleep -Seconds 30
        shell: powershell

      - name: 3. Verify Directory & Compress
        run: |
          # Kiểm tra cả 2 phân vùng cài đặt (System và User)
          $targetDirSystem = "C:\Program Files\Samsung\Internet\Application"
          $targetDirUser = "$env:LOCALAPPDATA\Samsung\Internet\Application"
          $zipName = "SamsungInternet_Offline.zip"
          
          $finalDir = ""
          
          if (Test-Path $targetDirSystem) {
              $finalDir = $targetDirSystem
              Write-Host "Phát hiện cài đặt System-level tại: $finalDir"
          } elseif (Test-Path $targetDirUser) {
              $finalDir = $targetDirUser
              Write-Host "Phát hiện cài đặt User-level tại: $finalDir"
          }

          if ($finalDir -ne "") {
              Write-Host "Đang nén thư mục..."
              Compress-Archive -Path "$finalDir\*" -DestinationPath $zipName -Force
              Write-Host "Nén thành công file: $zipName"
          } else {
              Write-Error "Lỗi: Không tìm thấy thư mục cài đặt ở cả System và User level."
              
              # Debug info
              Write-Host "--- Thử tìm thư mục Samsung ở Program Files ---"
              Get-ChildItem -Path "C:\Program Files\Samsung" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
              
              Write-Host "--- Thử tìm thư mục Samsung ở LocalAppData ---"
              Get-ChildItem -Path "$env:LOCALAPPDATA\Samsung" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
              
              exit 1
          }
        shell: powershell

      - name: 4. Upload Offline Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-internet-offline-zip
          path: SamsungInternet_Offline.zip
          retention-days: 7
