name: Build Samsung Internet Offline Installer

on:
  workflow_dispatch:

jobs:
  build-and-pack:
    runs-on: windows-latest
    
    steps:
      - name: 1. Download Samsung Internet Installer
        run: |
          $url = "https://browser.samsung.com/media/x64_SamsungInternetSetup.exe"
          Write-Host "Downloading $url..."
          Invoke-WebRequest -Uri $url -OutFile "SamsungSetup.exe"
        shell: powershell

      - name: 2 & 3. Install (C-Drive & RunAs) & Active Polling
        run: |
          Write-Host "Moving installer to C: drive to bypass Omaha drive bugs..."
          $workDir = "C:\SamsungTemp"
          New-Item -ItemType Directory -Force -Path $workDir | Out-Null
          Move-Item -Path ".\SamsungSetup.exe" -Destination "$workDir\SamsungSetup.exe" -Force
          Set-Location -Path $workDir
          
          Write-Host "Pre-creating Registry keys to prevent Omaha crash..."
          New-Item -Path "HKLM:\SOFTWARE\Samsung\Update" -Force -ErrorAction SilentlyContinue | Out-Null
          New-Item -Path "HKLM:\SOFTWARE\Google\Update" -Force -ErrorAction SilentlyContinue | Out-Null
          
          Write-Host "Starting Web Installer with forced High-IL (RunAs)..."
          $args = @("--system-level", "--silent", "--do-not-launch-chrome")
          
          # -Verb RunAs ép PowerShell cấp Elevation Token (Quyền Admin tuyệt đối)
          Start-Process -FilePath ".\SamsungSetup.exe" -ArgumentList $args -NoNewWindow -Verb RunAs
          
          $targetDir = "C:\Program Files\Samsung\Internet\Application"
          $finalDir = ""
          
          $timeoutSeconds = 300
          $interval = 5
          $elapsed = 0
          $isInstalled = $false
          
          Write-Host "Waiting for payload at $targetDir (Timeout: 5 mins)..."
          
          while ($elapsed -lt $timeoutSeconds) {
              if (Test-Path $targetDir) {
                  $finalDir = $targetDir
                  $exes = Get-ChildItem -Path $finalDir -Filter "*.exe" -ErrorAction SilentlyContinue
                  
                  if ($exes.Count -gt 0) {
                      Write-Host "Download complete! Found core executable at $finalDir"
                      $isInstalled = $true
                      Write-Host "Waiting 20s for file handles to release..."
                      Start-Sleep -Seconds 20
                      break
                  }
              }
              
              Start-Sleep -Seconds $interval
              $elapsed += $interval
              Write-Host "Waited $elapsed seconds..."
          }
          
          if (-not $isInstalled) {
              Write-Error "Timeout! Installation exceeded 5 minutes or installer crashed."
              exit 1
          }
          
          # Quay lại workspace mặc định của GitHub để file ZIP xuất ra đúng chỗ
          $workspaceZip = "$env:GITHUB_WORKSPACE\SamsungInternet_Offline.zip"
          Write-Host "Compressing offline folder to workspace..."
          Compress-Archive -Path "$finalDir\*" -DestinationPath $workspaceZip -Force
          Write-Host "Compression successful!"
        shell: powershell

      - name: 4. Upload Offline Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-internet-offline-zip
          path: SamsungInternet_Offline.zip
          retention-days: 7
