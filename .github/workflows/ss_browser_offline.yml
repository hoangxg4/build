name: Get Samsung Internet Offline Installer

on:
  workflow_dispatch: 

jobs:
  download-and-extract:
    runs-on: windows-latest
    # Ép tất cả các step dùng PowerShell Core (pwsh) thay vì Windows PowerShell cũ
    defaults:
      run:
        shell: pwsh

    steps:
      - name: 1. Khoi dong Chien dich
        run: Write-Host "Bat dau tien trinh tu dong tai va trich xuat Samsung Internet..."

      - name: 2 & 3. WAF Bypass via curl (Bulletproof)
        run: |
          Write-Host "Kich hoat Plan F: Vuot tuong lua CloudFront bang curl.exe..."
          
          # 1. Tao file Payload XML
          $xmlRequest = '<?xml version="1.0" encoding="UTF-8"?><request protocol="3.0" updater="samsung-internet" ismachine="1"><os platform="win" version="10.0" arch="x64"/><app appid="ohpjbciplfdockeiligelcjnkiejldpn" version="0.0.0.0" installsource="ondemand"><updatecheck/></app></request>'
          Set-Content -Path "payload.xml" -Value $xmlRequest -Encoding utf8
          
          # 2. Goi curl bang mang tham so
          $url = "https://update.internet.apps.samsung.com/service/update2"
          $curlArgs = @(
              "-s", "-X", "POST", $url,
              "-H", "Content-Type: application/xml",
              "-H", "User-Agent: SamsungInternetUpdater 143.0.0.8",
              "-H", "X-Goog-Update-AppId: ohpjbciplfdockeiligelcjnkiejldpn",
              "-H", "X-Goog-Update-Updater: updater-143.0.7499.194",
              "-H", "X-Goog-Update-Interactivity: fg",
              "-H", "Accept: */*",
              "-H", "Cache-Control: no-cache",
              "-d", "@payload.xml",
              "-o", "response.xml"
          )
          
          Write-Host "Dang ban payload qua tuong lua..."
          & curl.exe $curlArgs
            
          # 3. Phan tich ket qua
          if (-not (Test-Path "response.xml") -or (Get-Item "response.xml").Length -eq 0) {
              Write-Error "[Loi] CloudFront van chan hoac khong co phan hoi."
              exit 1
          }
          
          [xml]$xmlData = Get-Content "response.xml"
          
          if ($xmlData.html) {
              Write-Error "[Loi] Da bi WAF chan! Response tra ve trang HTML 403."
              Get-Content "response.xml" | Select-Object -First 10
              exit 1
          }
          
          $updateCheckStatus = $xmlData.SelectSingleNode("//updatecheck").status
          
          if ($updateCheckStatus -eq "ok") {
              $version = $xmlData.SelectSingleNode("//manifest").version
              $baseUrl = $xmlData.SelectSingleNode("//url").codebase
              $filename = $xmlData.SelectSingleNode("//package").name
              $dlUrl = "$baseUrl$filename"
              
              Write-Host "=================================================="
              Write-Host "[THANG LOI] Vuot WAF thanh cong!"
              Write-Host "Phien ban: $version"
              Write-Host "Link tai: $dlUrl"
              Write-Host "=================================================="
              
              Write-Host "Dang keo file qua curl..."
              & curl.exe -s -L -o $filename $dlUrl
              
              Write-Host "Giai nen bang 7-Zip..."
              $extractDir = "SamsungOffline"
              New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
              & "C:\Program Files\7-Zip\7z.exe" x $filename -o$extractDir -y
              
              if ($LASTEXITCODE -eq 0) {
                  Write-Host "Dong goi Artifact thanh file ZIP..."
                  Compress-Archive -Path "$extractDir\*" -DestinationPath "SamsungInternet_Offline.zip" -Force
                  Write-Host "[HOAN TAT] Moi thu da san sang!"
              } else {
                  Write-Error "[Loi] Giai nen that bai."
                  exit 1
              }
          } else {
              Write-Error "[Loi] Server tu choi request. Noi dung Response:"
              Get-Content "response.xml"
              exit 1
          }

      - name: 4. Xuat kho (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: SamsungInternet_Offline_Installer
          path: SamsungInternet_Offline.zip
          retention-days: 5
